name: Daily Weather Mail (UTC+8)

on:
  schedule:
    # UTC+8 时间 00:00 执行
    # 对应 UTC 时间 16:00（前一天的 16:00）
    - cron: '0 16 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]  # 代码推送时也运行（用于测试）

jobs:
  send-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: 运行天气邮件脚本
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          LOCATION_CITY: ${{ secrets.LOCATION_CITY }}
        run: python main.py
        
      - name: 记录执行时间
        if: always()
        run: |
          echo "执行完成于: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S %Z')"
