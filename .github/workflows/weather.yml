name: Daily Weather Mail (UTC+8)

on:
  schedule:
    # 每天 UTC 时间 16:00 执行（对应 UTC+8 时间 00:00）
    - cron: '0 16 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]  # 代码推送时自动运行（用于测试）

jobs:
  send-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # 1. 获取代码
      - name: 检出代码
        uses: actions/checkout@v4
        
      # 2. 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      # 3. 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      # 4. 运行天气邮件脚本
      - name: 运行天气邮件脚本
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_AUTH_CODE: ${{ secrets.SENDER_AUTH_CODE }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          LOCATION_CITY: ${{ secrets.LOCATION_CITY }}
        run: python main.py
        
      # 5. 记录执行时间（可选）
      - name: 记录执行时间
        if: always()
        run: |
          echo "执行完成于: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S %Z')"
